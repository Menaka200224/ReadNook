<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Readnook — Sign up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">read<span>nook</span></a>
  </header>

  <main>
    <div class="auth-box">
      <h2>Create your account</h2>
      <p class="auth-sub">Join Readnook and start tracking your reading</p>

      <div id="error-msg" class="error-msg hidden"></div>

      <div class="auth-form">
        <input id="name"     type="text"     placeholder="Your name"     class="search-input" />
        <input id="email"    type="email"    placeholder="Email address" class="search-input" />
        <input id="password" type="password" placeholder="Password"      class="search-input" />

        <select id="role" class="search-input" style="font-family:system-ui,sans-serif">
             <option value="reader">I am a Reader</option>
             <option value="publisher">I am a Publisher</option>
        </select>
   
        <button id="register-btn" class="submit-btn" style="width:100%">Create account</button>
      </div>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
     document.getElementById("register-btn").addEventListener("click", async () => {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const role     = document.getElementById("role").value;
  const errEl    = document.getElementById("error-msg");

  errEl.classList.add("hidden");

  if (!name) {
    errEl.textContent = "Please enter your name";
    errEl.classList.remove("hidden"); return;
  }
  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    errEl.textContent = "Please enter a valid email address";
    errEl.classList.remove("hidden"); return;
  }
  if (password.length < 6) {
    errEl.textContent = "Password must be at least 6 characters";
    errEl.classList.remove("hidden"); return;
  }

  const btn = document.getElementById("register-btn");
  btn.textContent = "Creating account...";
  btn.disabled    = true;

  const res  = await fetch("/api/auth/register", {
    method:      "POST",
    headers:     { "Content-Type": "application/json" },
    credentials: "include",
    body:        JSON.stringify({ name, email, password, role }),
  });
  const data = await res.json();

  if (!res.ok) {
    errEl.textContent = data.error;
    errEl.classList.remove("hidden");
    btn.textContent = "Create account";
    btn.disabled    = false;
    return;
  }

  window.location.href = data.role === "publisher" ? "publisher.html" : "index.html";
});

 });
 
  </script>

</body>
</html>
