<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Book List</title>
  <link rel="stylesheet" href="style.css" />
</head>


<body>

  <header>
  <a href="index.html" class="logo">read<span>nook</span></a>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">Discover</a>
    <a href="#">Publishers</a>
  </nav>
</header>

  <main>
     <!-- Search bar-->
    <input
      type="text"
      id="search"
      placeholder="Search books or authors..."
      class="search-input"
    />

    <!-- Filter buttons -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="reading">Reading</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="want">Want to read</button>
    </div>

    

    <!-- Add book form -->
    <div class="top-bar">
  <p class="section-label">Your reading list</p>
  <button id="add-book-btn" class="add-btn">+ Add book</button>
</div>

<div id="add-form" class="add-form hidden">
  <input id="new-title"  type="text" placeholder="Book title"   class="search-input" />
  <input id="new-author" type="text" placeholder="Author name"  class="search-input" />
  <button type="submit" form="book-form" class="submit-btn">Add to list</button>
  <form id="book-form"></form>
</div>

    <!-- Cards render here -->
    <div class="book-grid" id="book-grid"></div>
  </main>

  <footer>© 2025 Readnook — cozy reading, for everyone</footer>

  <script src="app.js"></script>

  </body>

</html>
