<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Book List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>My Reading List</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="book.html">Add Book</a>
    </nav>
  </header>

  <main>
    <div class="book-grid">

      <div class="book-card">
        <h2>The Pragmatic Programmer</h2>
        <p class="author">David Thomas & Andrew Hunt</p>
        <span class="status reading">Reading</span>
        <a href="book.html">View details →</a>
      </div>

      <div class="book-card">
        <h2>Atomic Habits</h2>
        <p class="author">James Clear</p>
        <span class="status done">Done</span>
        <a href="book.html">View details →</a>
      </div>

      <div class="book-card">
        <h2>Deep Work</h2>
        <p class="author">Cal Newport</p>
        <span class="status want">Want to read</span>
        <a href="book.html">View details →</a>
      </div>

    </div>
  </main>

</body>
</html>
